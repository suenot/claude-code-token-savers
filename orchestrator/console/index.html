<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>shuba console</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b0b0c;
        --rail: #090909;
        --sidebar: #0d0d0f;
        --panel: #141416;
        --panel-2: #191a1d;
        --border: #262629;
        --border-soft: #1e1e21;
        --text: #ededef;
        --muted: #8a8a91;
        --faint: #63636a;
        --accent: #3b82f6;
        --accent-soft: rgba(59, 130, 246, 0.14);
        --ok: #4ade80;
        --warn: #e0a13a;
        --bad: #f05a5a;
        --radius: 10px;
        --code-bg: rgba(255, 255, 255, 0.06);
        --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
      :root[data-theme="light"] {
        color-scheme: light;
        --bg: #f6f7f8;
        --rail: #eef0f2;
        --sidebar: #ffffff;
        --panel: #ffffff;
        --panel-2: #f3f4f6;
        --border: #e3e5e9;
        --border-soft: #edeef1;
        --text: #17181b;
        --muted: #5c6069;
        --faint: #9aa0a8;
        --accent: #2b6fe0;
        --accent-soft: rgba(43, 111, 224, 0.1);
        --ok: #15a34a;
        --warn: #c07f16;
        --bad: #d64545;
        --code-bg: rgba(0, 0, 0, 0.05);
      }
      :root[data-theme="light"] .nav-item.active { color: #1b4fa8; }
      :root[data-theme="light"] .rail-icon.active { color: #1b4fa8; }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--font);
        font-size: 14px;
        line-height: 1.45;
        -webkit-font-smoothing: antialiased;
      }
      #root { height: 100%; }
      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 0.88em;
        background: var(--code-bg);
        padding: 1px 5px;
        border-radius: 4px;
      }
      a { color: var(--accent); text-decoration: none; }
      a:hover { text-decoration: underline; }

      /* ---- shell ---- */
      .shell { display: flex; height: 100%; }
      .rail {
        width: 56px; flex: 0 0 56px;
        background: var(--rail);
        border-right: 1px solid var(--border-soft);
        display: flex; flex-direction: column; align-items: center;
        padding: 12px 0; gap: 4px;
      }
      .rail-logo {
        width: 34px; height: 34px; border-radius: 9px;
        display: grid; place-items: center; margin-bottom: 12px;
        background: linear-gradient(160deg, #2b6fe0, #1b3f80);
        color: #fff; font-size: 18px;
      }
      .rail-icon {
        width: 38px; height: 38px; border-radius: 9px;
        display: grid; place-items: center; cursor: pointer;
        color: var(--faint); background: transparent; border: 0;
        transition: color .12s, background .12s;
      }
      .rail-icon:hover { color: var(--muted); background: rgba(255,255,255,0.04); }
      .rail-icon.active { color: #cfe0ff; background: var(--accent-soft); }

      .sidebar {
        width: 236px; flex: 0 0 236px;
        background: var(--sidebar);
        border-right: 1px solid var(--border-soft);
        padding: 18px 12px; overflow-y: auto;
      }
      .sidebar-title { font-size: 15px; font-weight: 600; padding: 0 8px 16px; }
      .nav-group { margin-bottom: 14px; }
      .nav-label {
        font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase;
        color: var(--faint); padding: 0 8px; margin-bottom: 6px;
      }
      .nav-item {
        display: flex; align-items: center; gap: 10px;
        width: 100%; text-align: left;
        padding: 7px 8px; margin: 1px 0; border-radius: 8px;
        background: transparent; border: 0; cursor: pointer;
        color: var(--muted); font-size: 13.5px; font-family: var(--font);
        transition: background .12s, color .12s;
      }
      .nav-item:hover { background: rgba(255,255,255,0.04); color: var(--text); }
      .nav-item.active { background: var(--accent-soft); color: #eaf1ff; }
      .nav-item svg { flex: 0 0 16px; }

      .content { flex: 1; overflow-y: auto; padding: 0 32px 40px; }
      .page-header {
        padding: 26px 0 20px; margin-bottom: 8px;
        border-bottom: 1px solid var(--border-soft);
        display: flex; align-items: flex-start; justify-content: space-between; gap: 16px;
      }
      .page-title { font-size: 20px; font-weight: 600; margin: 0; }
      .page-sub { color: var(--muted); margin: 6px 0 0; font-size: 13.5px; }
      .content-body { padding-top: 22px; width: 100%; }

      /* theme toggle */
      .theme-toggle {
        display: grid; place-items: center;
        width: 34px; height: 34px; border-radius: 8px;
        background: transparent; border: 1px solid var(--border); cursor: pointer;
        color: var(--muted);
      }
      .theme-toggle:hover { color: var(--text); background: rgba(127,127,127,0.08); }

      /* ---- panels / cards ---- */
      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 16px 18px;
        margin-bottom: 16px;
      }
      .panel-title { margin: 0 0 12px; font-size: 14px; font-weight: 600; }

      /* ---- stat row ---- */
      .stat-row {
        display: flex; background: var(--panel);
        border: 1px solid var(--border); border-radius: var(--radius);
        overflow: hidden; margin-bottom: 16px;
      }
      .stat { flex: 1; padding: 16px 18px; border-left: 1px solid var(--border-soft); }
      .stat:first-child { border-left: 0; }
      .stat-label { color: var(--muted); font-size: 12px; margin-bottom: 6px; }
      .stat-value { font-size: 22px; font-weight: 600; letter-spacing: -0.01em; }
      .stat-sub { color: var(--faint); font-size: 11.5px; margin-top: 4px; }

      /* ---- list rows ---- */
      .row {
        display: flex; align-items: center; justify-content: space-between;
        padding: 13px 2px; border-top: 1px solid var(--border-soft);
      }
      .row:first-child { border-top: 0; }
      .row-main { font-size: 13.5px; }
      .row-sub { color: var(--faint); font-size: 12px; margin-top: 3px; }
      .badge-ok { color: var(--ok); font-size: 12.5px; }

      /* ---- forms ---- */
      .field { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
      .field label { flex: 0 0 190px; color: var(--muted); font-size: 13px; }
      .field input[type="text"], .field input[type="number"], .field select {
        flex: 1; max-width: 340px;
        background: var(--panel-2); color: var(--text);
        border: 1px solid var(--border); border-radius: 7px;
        padding: 7px 10px; font-size: 13px; font-family: var(--font);
      }
      .field input:focus, .field select:focus { outline: none; border-color: var(--accent); }
      .field .hint { color: var(--faint); font-size: 12px; }
      .btn {
        background: var(--accent); color: #fff; border: 0; border-radius: 8px;
        padding: 9px 16px; font-size: 13.5px; font-weight: 600; cursor: pointer; font-family: var(--font);
      }
      .btn:hover { filter: brightness(1.08); }
      .btn:disabled { opacity: 0.5; cursor: default; }
      .banner {
        background: var(--accent-soft); border: 1px solid var(--border);
        border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 16px;
      }

      /* ---- tables ---- */
      table { border-collapse: collapse; width: 100%; }
      th { color: var(--muted); font-weight: 500; text-align: left; }
      th, td { border-color: var(--border-soft) !important; }

      /* scrollbars */
      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-thumb { background: #2a2a2e; border-radius: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
